<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discover events - Gatherly</title>
  <link rel="icon" href="/assets/favicon.png">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* hero */
    .disc-hero { padding: 52px 0 32px; position: relative; }
    .disc-hero h1 { font-size: clamp(1.8rem, 3.8vw, 2.8rem); line-height: 1.12; margin-bottom: 10px; }
    .disc-hero p  { max-width: 480px; font-size: .95rem; color: var(--muted); margin-bottom: 22px; }

    /* pulse stats */
    .disc-pulse { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 24px; }
    .disc-pulse-stat { display: flex; align-items: center; gap: 7px; font-size: .83rem; }
    .disc-pdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .disc-pdot.live { background: var(--live); box-shadow: 0 0 0 3px rgba(251,146,60,0.22); animation: pulse 1.6s infinite; }
    .disc-pdot.up   { background: var(--good); }
    .disc-pulse-stat b { color: var(--text); }

    /* search + filter bar */
    .disc-bar {
      background: rgba(19,19,24,0.85); border: 1px solid rgba(129,140,248,0.16);
      border-radius: 12px; backdrop-filter: blur(14px);
    }
    .disc-bar-top {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    }
    .disc-search-icon { color: var(--muted); flex-shrink: 0; }
    .disc-search-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--font-body); font-size: .95rem; color: var(--text);
    }
    .disc-search-input::placeholder { color: var(--muted); }
    .disc-bar-divider { width: 1px; height: 20px; background: var(--line-strong); flex-shrink: 0; }

    /* timezone */
    .disc-tz { background: none; border: none; outline: none; font-family: var(--font-body); font-size: .8rem; color: var(--muted); cursor: pointer; max-width: 150px; }
    .disc-tz:focus { color: var(--text); }
    option { background: #131318; }

    /* filter toggle button */
    .disc-filter-toggle {
      display: flex; align-items: center; gap: 6px; padding: 6px 14px;
      border: 1px solid var(--line-strong); border-radius: 8px; background: transparent;
      color: var(--muted); font-size: .82rem; font-weight: 600; font-family: var(--font-body);
      cursor: pointer; transition: all .15s; white-space: nowrap; flex-shrink: 0;
    }
    .disc-filter-toggle:hover { border-color: rgba(129,140,248,0.5); color: var(--text); }
    .disc-filter-toggle.active { border-color: var(--signal); color: var(--signal); background: rgba(129,140,248,0.08); }
    .disc-filter-count {
      display: none; width: 18px; height: 18px; border-radius: 50%; background: var(--signal);
      color: #0b0b0f; font-size: .68rem; font-weight: 700; align-items: center; justify-content: center;
    }
    .disc-filter-count.show { display: flex; }

    /* filter drawer */
    .disc-drawer {
      overflow: hidden; max-height: 0;
      transition: max-height .28s cubic-bezier(.4,0,.2,1), padding .28s;
      border-top: 0px solid var(--line);
    }
    .disc-drawer.open { max-height: 300px; border-top-width: 1px; }
    .disc-drawer-inner { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 10px; }

    .disc-frow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .disc-flabel { font-size: .68rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); width: 68px; flex-shrink: 0; }

    /* chips */
    .disc-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 999px; font-size: .78rem; font-weight: 600;
      border: 1px solid var(--line-strong); background: transparent; color: var(--muted);
      cursor: pointer; transition: all .15s; font-family: var(--font-body); white-space: nowrap;
    }
    .disc-chip:hover  { border-color: rgba(129,140,248,0.5); color: var(--text); background: rgba(129,140,248,0.05); }
    .disc-chip.active { border-color: var(--signal); color: var(--signal); background: rgba(129,140,248,0.1); }
    .disc-chip.live-chip.active { border-color: var(--live); color: var(--live); background: rgba(251,146,60,0.1); }

    /* live dot — always red/orange, animated */
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--live); flex-shrink: 0;
      animation: pulse 1.4s infinite;
      box-shadow: 0 0 0 2px rgba(251,146,60,0.25);
    }

    /* 4-col event grid */
    .disc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 1200px) { .disc-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 840px)  { .disc-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px)  { .disc-grid { grid-template-columns: 1fr; } }

    /* result meta row */
    .disc-meta-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: .8rem; color: var(--muted); margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
    }
    .disc-meta-row b { color: var(--text); }

    /* event cards */
    .ev-card {
      border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
      background: linear-gradient(160deg, var(--panel) 0%, var(--ink-2) 100%);
      display: flex; flex-direction: column;
      transition: border-color .18s, transform .18s, box-shadow .18s;
    }
    .ev-card:hover { border-color: rgba(129,140,248,0.4); transform: translateY(-3px); box-shadow: 0 14px 36px -14px rgba(0,0,0,0.5); }
    .ev-card.boosted  { border-color: rgba(251,146,60,0.3); }
    .ev-card.boosted:hover  { border-color: rgba(251,146,60,0.6); box-shadow: 0 14px 36px -14px rgba(251,146,60,0.2); }
    .ev-card.is-live  { border-color: rgba(74,222,128,0.22); }
    .ev-card.is-live:hover  { border-color: rgba(74,222,128,0.5); }

    .ev-boost-bar {
      padding: 6px 14px; font-size: .68rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      background: linear-gradient(90deg, rgba(251,146,60,0.15), rgba(251,146,60,0.03));
      border-bottom: 1px solid rgba(251,146,60,0.15); color: var(--live);
      display: flex; align-items: center; gap: 6px;
    }
    .ev-boost-bar::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--live); animation: pulse 1.4s infinite; flex-shrink: 0; }

    .ev-banner {
      aspect-ratio: 16/8; background: linear-gradient(120deg, var(--panel-2), var(--ink-2));
      position: relative; overflow: hidden;
    }
    .ev-banner img { width: 100%; height: 100%; object-fit: cover; }
    .ev-banner-badges { position: absolute; top: 8px; left: 8px; display: flex; gap: 5px; flex-wrap: wrap; }
    .ev-scenario-tag {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(11,11,15,0.82); border: 1px solid var(--line-strong);
      border-radius: 5px; padding: 3px 8px; font-size: .68rem; font-weight: 600;
      color: var(--text); backdrop-filter: blur(8px);
    }

    .ev-body { padding: 13px 15px 15px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .ev-title { font-family: var(--font-display); font-size: .97rem; font-weight: 600; color: var(--text); line-height: 1.2; margin: 0; }
    .ev-desc  { font-size: .78rem; color: var(--muted); margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .ev-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: .74rem; color: var(--muted); }
    .ev-meta-item { display: flex; align-items: center; gap: 3px; }

    .ev-fill-bar {
      height: 3px; background: var(--line); border-radius: 2px; overflow: hidden;
    }
    .ev-fill-bar-inner { height: 100%; border-radius: 2px; transition: width .4s; }

    .ev-footer { display: flex; gap: 8px; align-items: center; margin-top: auto; padding-top: 2px; }
    .ev-code-out { font-size: .82rem; padding: 7px 10px; border-radius: 7px; }

    /* empty / loading / sentinel */
    .disc-empty { padding: 56px 24px; text-align: center; border: 1px dashed var(--line-strong); border-radius: 12px; color: var(--muted); grid-column: 1/-1; }
    .disc-empty h3 { color: var(--text); margin-bottom: 8px; }
    .disc-loading { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 56px 0; color: var(--muted); font-size: .83rem; grid-column: 1/-1; }
    #scrollSentinel { height: 1px; grid-column: 1/-1; }
    .disc-load-more { grid-column: 1/-1; display: flex; justify-content: center; padding: 16px 0; }
  </style>
</head>
<body>
<nav id="nav"></nav>

<header class="disc-hero">
  <div class="wrap">
    <span class="kicker">Discover</span>
    <h1 style="margin-top:10px">Find your next<br><span style="color:var(--signal)">ER:LC session</span></h1>
    <p>Live and upcoming events from the community. Boosted sessions always at the top.</p>

    <div class="disc-pulse" id="discPulse">
      <div class="disc-pulse-stat">
        <span class="disc-pdot live"></span><b id="liveCount">—</b>&nbsp;live now
      </div>
      <div class="disc-pulse-stat">
        <span class="disc-pdot up"></span><b id="upCount">—</b>&nbsp;upcoming
      </div>
    </div>

    <!-- search + filter bar -->
    <div class="disc-bar">
      <div class="disc-bar-top">
        <svg class="disc-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="disc-search-input" id="searchInput" placeholder="Search events, hosts, scenarios…" autocomplete="off">
        <div class="disc-bar-divider"></div>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <select class="disc-tz" id="tzSelect" title="Timezone"><option value="">My timezone</option></select>
        <div class="disc-bar-divider"></div>
        <button class="disc-filter-toggle" id="filterToggle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          Filters
          <span class="disc-filter-count" id="filterCount">0</span>
        </button>
      </div>

      <!-- expandable filter drawer -->
      <div class="disc-drawer" id="filterDrawer">
        <div class="disc-drawer-inner">
          <div class="disc-frow">
            <span class="disc-flabel">Status</span>
            <button class="disc-chip active" data-filter="all">All</button>
            <button class="disc-chip live-chip" data-filter="live"><span class="live-dot"></span>Live now</button>
            <button class="disc-chip" data-filter="upcoming">Upcoming</button>
            <button class="disc-chip" data-filter="boosted">Boosted</button>
            <button class="disc-chip" data-filter="members">Most players</button>
          </div>
          <div class="disc-frow">
            <span class="disc-flabel">Scenario</span>
            <button class="disc-chip active" data-scenario="">Any</button>
            <button class="disc-chip" data-scenario="border-patrol">Border Patrol</button>
            <button class="disc-chip" data-scenario="pursuit">Pursuit</button>
            <button class="disc-chip" data-scenario="court-trial">Court Trial</button>
            <button class="disc-chip" data-scenario="weather-hazard">Weather Hazard</button>
            <button class="disc-chip" data-scenario="department-tryout">Dept. Tryout</button>
            <button class="disc-chip" data-scenario="unrestricted-roleplay">Unrestricted RP</button>
            <button class="disc-chip" data-scenario="patrol">Patrol</button>
            <button class="disc-chip" data-scenario="bank-robbery">Bank Robbery</button>
            <button class="disc-chip" data-scenario="riot-control">Riot Control</button>
            <button class="disc-chip" data-scenario="hostage">Hostage</button>
            <button class="disc-chip" data-scenario="fire-response">Fire Response</button>
            <button class="disc-chip" data-scenario="medical-response">Medical Response</button>
            <button class="disc-chip" data-scenario="miscellaneous-event">Misc.</button>
          </div>
          <div class="disc-frow">
            <span class="disc-flabel">Duration</span>
            <button class="disc-chip active" data-duration="">Any</button>
            <button class="disc-chip" data-duration="short">Under 1h</button>
            <button class="disc-chip" data-duration="medium">1–2h</button>
            <button class="disc-chip" data-duration="long">2h+</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<section class="wrap" style="padding: 20px 0 80px">
  <div class="layout-rail">
    <div>
      <div class="disc-meta-row" id="discMeta" hidden>
        <span id="discCount"></span>
      </div>
      <div class="disc-grid" id="feed"></div>
      <div id="scrollSentinel"></div>
    </div>
    <aside class="ad-rail">
      <div class="ad-slot ad-slot--side" data-ad-slot="events-side"></div>
      <div class="card" style="text-align:center;border-color:rgba(129,140,248,0.2)">
        <h3 style="font-size:.98rem;margin-bottom:8px">List your event</h3>
        <p style="font-size:.8rem;margin-top:0">Reach players already browsing this feed.</p>
        <a href="/advertise" class="btn btn-primary btn-sm" style="margin-top:12px;width:100%">Advertise free</a>
      </div>
    </aside>
  </div>
</section>

<div class="wrap"><div class="ad-slot" data-ad-slot="events-bottom"></div></div>
<footer id="footer"></footer>
<script type="module" src="/js/pages/events.js"></script>
</body>
</html>
