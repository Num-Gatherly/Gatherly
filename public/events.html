<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discover events - Gatherly</title>
  <link rel="icon" href="/assets/favicon.png">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="nav"></nav>

<header class="section" style="padding-bottom:8px">
  <div class="wrap">
    <span class="kicker">Discover</span>
    <h1 style="font-size:clamp(2rem,4vw,3rem)">Live and upcoming events</h1>
    <p style="margin-top:10px;max-width:560px">Boosted events sit up top with a red highlight. Search by name, host, or scenario, or filter the feed.</p>

    <div class="discover-controls">
      <input class="discover-search" id="searchInput" placeholder="Search events, hosts, scenarios&hellip;" autocomplete="off">
      <div class="filter-chips">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="live">Live now</button>
        <button class="chip" data-filter="upcoming">Upcoming</button>
        <button class="chip" data-filter="boosted">Boosted</button>
        <button class="chip" data-filter="members">Most players</button>
      </div>
    </div>
  </div>
</header>

<section class="wrap" style="padding-bottom:60px">
  <div class="layout-rail">
    <div class="grid grid-2" id="feed"><p>Loading&hellip;</p></div>
    <aside class="ad-rail">
      <div class="ad-slot ad-slot--side" data-ad-slot="events-side"></div>
      <div class="card" style="text-align:center">
        <h3 style="font-size:1.02rem">Want your event here?</h3>
        <p style="font-size:.85rem;margin-top:6px">List in under two minutes and reach players already browsing this feed.</p>
        <a href="/advertise" class="btn btn-primary btn-sm" style="margin-top:14px;width:100%">Advertise your event</a>
      </div>
    </aside>
  </div>
</section>

<div class="wrap"><div class="ad-slot" data-ad-slot="events-bottom"></div></div>

<footer id="footer"></footer>

<script type="module" src="/js/pages/events.js"></script>
</body>
</html>
